<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STND - Standard Procedure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>STND</h1>
        <p class="slogan">Above all standards</p>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Lookbook</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Not trend procedure</h2>
        <p>Free delivery in Joburg, Cape Town & Durban</p>
        <button>Shop Now</button>
    </section>

    <section class="products">
        <h2>Bestsellers</h2>
        <div class="product-grid">
            <div class="product">
                <img src="https://placehold.co/300x400?text=STND+Tee" alt="STND T-shirt">
                <h3>Standard Tee</h3>
                <p>R 450</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://placehold.co/300x400?text=STND+Hoodie" alt="Hoodie">
                <h3>Oversized Hoodie</h3>
                <p>R 899</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://placehold.co/300x400?text=STND+Cargo" alt="Cargo">
                <h3>Cargo Pants</h3>
                <p>R 1 199</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 STND — Standard Procedure. Above all standards.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
